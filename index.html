<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BINJO Bags</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #111, #333);
    color: white;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 30px 20px;
  }

  .logo {
    font-size: 50px;
    font-weight: bold;
  }

  .moto {
    color: gold;
    margin-top: 5px;
  }

  /* NAV */
  .nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  button {
    padding: 10px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
  }

  .btn {
    background: black;
    color: white;
  }

  .btn:hover {
    background: gold;
    color: black;
  }

  /* LOGIN BOX */
  .auth-box {
    display: none;
    background: white;
    color: black;
    width: 300px;
    margin: auto;
    padding: 20px;
    border-radius: 10px;
  }

  input {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
  }

  /* PRODUCTS */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
  }

  .card {
    background: white;
    color: black;
    border-radius: 10px;
    overflow: hidden;
    text-align: center;
  }

  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
  }

  /* WHATSAPP */
  .whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="header">
  <div class="logo">BINJO 💯</div>
  <div class="moto">Where quality meets affordable prices</div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="btn" onclick="showLogin()">Login</button>
  <button class="btn" onclick="showRegister()">Register</button>
  <button class="btn" onclick="logout()">Logout</button>
  <span id="userDisplay"></span>
</div>

<!-- AUTH BOX -->
<div class="auth-box" id="authBox">
  <h3 id="formTitle">Login</h3>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button class="btn" onclick="authAction()">Submit</button>
</div>

<!-- PRODUCTS -->
<div class="grid">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3"/>
    <h3>Demo Bag</h3>
    <p>KSh 1500</p>
    <button class="btn" onclick="addToCart()">Add to Cart 👍</button>
  </div>
</div>

<!-- WHATSAPP BUTTON -->
<a class="whatsapp" href="https://wa.me/254792887738" target="_blank">
  WhatsApp Us
</a>

<script>
let mode = "login";

function showLogin(){
  document.getElementById("authBox").style.display = "block";
  document.getElementById("formTitle").innerText = "Login";
  mode = "login";
}

function showRegister(){
  document.getElementById("authBox").style.display = "block";
  document.getElementById("formTitle").innerText = "Register";
  mode = "register";
}

function authAction(){
  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  if(!u || !p) return alert("Fill all fields");

  if(mode === "register"){
    localStorage.setItem(u, p);
    alert("Registered successfully");
  } else {
    let saved = localStorage.getItem(u);
    if(saved === p){
      localStorage.setItem("loggedInUser", u);
      document.getElementById("userDisplay").innerText = "Hello " + u;
      alert("Login successful");
    } else {
      alert("Invalid login");
    }
  }
}

function logout(){
  localStorage.removeItem("loggedInUser");
  document.getElementById("userDisplay").innerText = "";
  alert("Logged out");
}

function addToCart(){
  let user = localStorage.getItem("loggedInUser");
  if(!user){
    alert("Please login first");
  } else {
    alert("Added to cart 👍");
  }
}
</script>

</body>
</html>
