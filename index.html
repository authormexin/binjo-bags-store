<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BINJO Bags Store</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}

/* ENTRY SCREEN */
#entry {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle, #1a1a1a, #000);
  animation: fadeOut 3s ease 3s forwards;
}

#entry h1 {
  font-size:60px;
  letter-spacing:5px;
  color:#ffcc00;
  animation: pulse 1.5s infinite;
}

#entry p {
  font-size:18px;
  color:#ddd;
}

@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

@keyframes fadeOut {
  to {opacity:0; visibility:hidden;}
}

/* MAIN STORE */
#store {
  display:none;
  padding:20px;
}

header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
}

h2 {
  color:#ffcc00;
}

.categories button {
  margin:5px;
  padding:10px;
  border:none;
  cursor:pointer;
  border-radius:8px;
  background:#222;
  color:white;
}

.categories button:hover {
  background:#ffcc00;
  color:black;
}

/* PRODUCTS */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  margin-top:20px;
}

.card {
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
}

.card img {
  width:100%;
  border-radius:10px;
}

.card button {
  width:100%;
  padding:8px;
  margin-top:8px;
  border:none;
  background:#ffcc00;
  cursor:pointer;
}

/* CART */
#cart {
  position:fixed;
  right:10px;
  top:10px;
  background:#222;
  padding:10px;
  border-radius:10px;
  width:200px;
}

#cart h3 {
  margin:0;
  color:#ffcc00;
}

.whatsapp {
  display:block;
  margin-top:10px;
  padding:10px;
  background:green;
  color:white;
  text-align:center;
  border-radius:8px;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry">
  <h1>BINJO 💯</h1>
  <p>Where quality meets affordable prices</p>
</div>

<!-- STORE -->
<div id="store">

<header>
  <h2>BINJO BAGS</h2>
</header>

<div class="categories">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('women')">Women Bags</button>
  <button onclick="filter('men')">Men Bags</button>
  <button onclick="filter('travel')">Travel Bags</button>
</div>

<div class="grid" id="products"></div>

<!-- CART -->
<div id="cart">
  <h3>Cart</h3>
  <div id="cartItems"></div>
  <a class="whatsapp" id="waLink" target="_blank">Checkout WhatsApp</a>
</div>

</div>

<script>
setTimeout(()=>{
  document.getElementById("entry").style.display="none";
  document.getElementById("store").style.display="block";
}, 3500);

const items = [
 {name:"Luxury Women Bag", price:1500, cat:"women", img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"},
 {name:"Classic Men Bag", price:1800, cat:"men", img:"https://images.unsplash.com/photo-1590874103328-eac38a683ce7"},
 {name:"Travel Backpack", price:2500, cat:"travel", img:"https://images.unsplash.com/photo-1553062407-98eeb64c6a62"},
];

let cart = [];

function showProducts(filterCat="all"){
  const box = document.getElementById("products");
  box.innerHTML="";
  items.filter(i=>filterCat==="all"||i.cat===filterCat).forEach((p)=>{
    box.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>KSh ${p.price}</p>
        <button onclick="addCart('${p.name}',${p.price})">Add to Cart</button>
      </div>
    `;
  });
}

function filter(cat){ showProducts(cat); }

function addCart(name,price){
  cart.push({name,price});
  renderCart();
}

function renderCart(){
  const box = document.getElementById("cartItems");
  box.innerHTML="";
  let total=0;

  cart.forEach((c,i)=>{
    total+=c.price;
    box.innerHTML += `<div>${c.name} - KSh ${c.price}</div>`;
  });

  const msg = encodeURIComponent("Hello BINJO, I want to buy items worth KSh "+total);
  document.getElementById("waLink").href =
  "https://wa.me/254700000000?text="+msg;
}

showProducts();
</script>

</body>
</html>
