<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BINJO Bags Kenya</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
  overflow-x: hidden;
}

.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
  url("https://images.unsplash.com/photo-1521334884684-d80222895322") center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  animation: fadeIn 3s ease-in-out;
}

.logo {
  font-size: 60px;
  font-weight: bold;
  letter-spacing: 5px;
  animation: float 3s infinite ease-in-out;
}

.tagline {
  font-size: 18px;
  margin-top: 10px;
  color: #ffd700;
}

.buttons {
  margin-top: 25px;
}

button {
  padding: 12px 20px;
  margin: 5px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
}

.shop {
  background: gold;
  color: black;
}

.whatsapp {
  background: #25D366;
  color: white;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes float {
  0% {transform: translateY(0px);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0px);}
}
</style>
</head>

<body>

<div class="hero">
  <div class="logo">BINJO 💼</div>
  <div class="tagline">Where quality meets affordable prices</div>

  <div class="buttons">
    <button class="shop" onclick="location.href='/products'">
      Enter Shop 🛍️
    </button>

    <a href="https://wa.me/254792887738" target="_blank">
      <button class="whatsapp">
        Chat on WhatsApp 📲
      </button>
    </a>
  </div>
</div>

</body>
</html>
