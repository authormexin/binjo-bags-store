<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BINJO Bags Store</title>
<style>
  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
  }/* Top bar */ .topbar{ position:sticky; top:0; background:#111; padding:10px; display:flex; gap:10px; align-items:center; z-index:10; }

.topbar input{ flex:1; padding:10px; border:none; border-radius:20px; outline:none; }

.topbar button{ padding:10px 14px; border:none; border-radius:20px; background:#ffcc00; cursor:pointer; font-weight:bold; }

/* Category layout */ .container{ padding:15px; display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; }

.card{ background:white; border-radius:12px; padding:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); text-align:center; }

.card img{ width:100%; border-radius:10px; }

.title{ font-weight:bold; margin-top:8px; }

.category-title{ grid-column: span 3; font-size:18px; font-weight:bold; margin-top:10px; }

/* Bottom nav */ .bottom-nav{ position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:space-around; background:#111; padding:10px 0; }

.bottom-nav button{ background:none; border:none; color:white; font-size:14px; cursor:pointer; }

.section{ display:none; }

.active{ display:grid; }

/* Login modal */ .login{ display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; }

.login-box{ background:white; padding:20px; border-radius:10px; width:300px; }

.login-box input{ width:100%; padding:10px; margin:5px 0; }

</style>
</head>
<body><!-- TOP BAR --><div class="topbar">
  <input type="text" id="search" placeholder="Search bags..." onkeyup="searchItems()" />
  <button onclick="openLogin()">Account</button>
</div><!-- CONTENT --><div class="container section active" id="home">  <div class="category-title">Women Bags</div>
  <div class="card"><img src="https://via.placeholder.com/200"><div class="title">Elegant Women Bag</div></div>
  <div class="card"><img src="https://via.placeholder.com/200"><div class="title">Luxury Handbag</div></div>
  <div class="card"><img src="https://via.placeholder.com/200"><div class="title">Fashion Purse</div></div>  <div class="category-title">Men Bags</div>
  <div class="card"><img src="https://via.placeholder.com/200"><div class="title">Leather Men Bag</div></div>
  <div class="card"><img src="https://via.placeholder.com/200"><div class="title">Office Backpack</div></div>
  <div class="card"><img src="https://via.placeholder.com/200"><div class="title">Casual Sling Bag</div></div>  <div class="category-title">Travel Bags</div>
  <div class="card"><img src="https://via.placeholder.com/200"><div class="title">Large Travel Bag</div></div>
  <div class="card"><img src="https://via.placeholder.com/200"><div class="title">Wheeled Suitcase</div></div>
  <div class="card"><img src="https://via.placeholder.com/200"><div class="title">Adventure Backpack</div></div></div><!-- OTHER SECTIONS --><div class="container section" id="categories">
  <h2>Categories Page</h2>
</div><div class="container section" id="cat">
  <h2>CAT Page (Custom)</h2>
</div><div class="container section" id="homebtn">
  <h2>Home Shortcut</h2>
</div><!-- BOTTOM NAV --><div class="bottom-nav">
  <button onclick="showSection('home')">Home</button>
  <button onclick="showSection('categories')">Category</button>
  <button onclick="showSection('cat')">Cat</button>
  <button onclick="openLogin()">Account</button>
</div><!-- LOGIN --><div class="login" id="login">
  <div class="login-box">
    <h3>Create Account</h3>
    <input type="text" placeholder="Name" />
    <input type="email" placeholder="Email" />
    <input type="password" placeholder="Password" />
    <button onclick="closeLogin()">Submit</button>
  </div>
</div><script>
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openLogin(){
  document.getElementById('login').style.display='flex';
}

function closeLogin(){
  document.getElementById('login').style.display='none';
}

function searchItems(){
  let input = document.getElementById('search').value.toLowerCase();
  let cards = document.querySelectorAll('.card');

  cards.forEach(card=>{
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(input) ? 'block' : 'none';
  });
}
</script></body>
</html>
