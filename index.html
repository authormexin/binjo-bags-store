<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINJO Bags</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: Montserrat, sans-serif;
    background: #111;
  }

  /* SPLASH */
  .splash {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeOut 1s ease forwards;
    animation-delay: 3s;
  }

  .logo {
    font-size: 70px;
    font-family: "Playfair Display", serif;
    font-weight: 800;
    color: #111;
  }

  .moto {
    margin-top: 10px;
    font-size: 18px;
    font-style: italic;
    color: #111;
  }

  .bags {
    margin-top: 15px;
    letter-spacing: 6px;
    font-size: 14px;
    color: #111;
    animation: float 2s infinite;
  }

  @keyframes float {
    0% { transform: translateX(-10px); }
    50% { transform: translateX(10px); }
    100% { transform: translateX(-10px); }
  }

  @keyframes fadeOut {
    to {
      opacity: 0;
      visibility: hidden;
    }
  }

  /* SHOP */
  .shop {
    padding: 20px;
    color: white;
    opacity: 0;
    animation: show 1s ease forwards;
    animation-delay: 3.2s;
  }

  @keyframes show {
    to { opacity: 1; }
  }

  h1 {
    font-size: 26px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    margin-top: 20px;
  }

  .card {
    background: #222;
    padding: 15px;
    border-radius: 12px;
  }
</style>
</head>

<body>

<!-- SPLASH -->
<div class="splash">
  <div class="logo">BINJO 💯</div>
  <div class="moto">Where quality meets affordable prices</div>
  <div class="bags">BAGS • BAGS • BAGS • BAGS</div>
</div>

<!-- SHOP -->
<div class="shop">
  <h1>BINJO BAG STORE</h1>

  <div class="grid">
    <div class="card">Luxury Bag 1 - KSh 1,500</div>
    <div class="card">Luxury Bag 2 - KSh 2,000</div>
    <div class="card">Luxury Bag 3 - KSh 2,500</div>
    <div class="card">Luxury Bag 4 - KSh 3,000</div>
  </div>
</div>

</body>
</html>
