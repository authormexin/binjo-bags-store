<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINJO Bags</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: Montserrat, sans-serif;
    background: #111;
    color: white;
  }

  /* SPLASH SCREEN */
  .splash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, #ffcc70, #c850c0, #1e1e2f);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    animation: fadeOut 1.2s ease forwards;
    animation-delay: 3s;
    z-index: 9999;
  }

  .binjo {
    font-size: 60px;
    font-family: "Playfair Display", serif;
    letter-spacing: 3px;
    animation: pulse 1.5s infinite alternate;
  }

  .moto {
    margin-top: 15px;
    font-size: 18px;
    font-style: italic;
    opacity: 0.9;
    transform: skewX(-10deg);
  }

  .bags {
    margin-top: 20px;
    font-size: 14px;
    letter-spacing: 4px;
    opacity: 0.6;
    animation: floatText 2s infinite linear;
  }

  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.1) rotate(-2deg); }
  }

  @keyframes floatText {
    0% { transform: translateX(-10px); }
    50% { transform: translateX(10px); }
    100% { transform: translateX(-10px); }
  }

  @keyframes fadeOut {
    to {
      opacity: 0;
      visibility: hidden;
    }
  }
