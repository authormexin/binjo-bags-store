<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BINJO Bags</title>

<style>
/* ===== ENTRY ANIMATION ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg,#111,#333);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  animation: fadeOut 3s ease forwards;
  animation-delay: 2.5s;
  z-index: 9999;
}

#intro h1 {
  font-size: 50px;
  letter-spacing: 5px;
}

#intro p {
  font-size: 18px;
  opacity: 0.8;
}

@keyframes fadeOut {
  to {opacity: 0; visibility: hidden;}
}

/* ===== HEADER ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: black;
  color: white;
  padding: 15px 20px;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 3px;
}

/* SEARCH */
.search-bar input {
  padding: 8px;
  width: 200px;
  border-radius: 5px;
  border: none;
}

/* ACCOUNT DROPDOWN */
.account {
  position: relative;
  cursor: pointer;
}

.dropdown {
  display: none;
  position: absolute;
  right: 0;
  background: white;
  color: black;
  min-width: 150px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

.dropdown a {
  display: block;
  padding: 10px;
  text-decoration: none;
  color: black;
}

.dropdown a:hover {
  background: #eee;
}

.account:hover .dropdown {
  display: block;
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  background: #222;
  padding: 10px;
}

nav a {
  color: white;
  text-decoration: none;
}

/* PRODUCTS */
.container {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: black;
  color: white;
  padding: 8px;
  border: none;
  width: 100%;
  margin-top: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- INTRO SCREEN -->
<div id="intro">
  <h1>BINJO 💯</h1>
  <p>Where quality meets affordable prices</p>
</div>

<!-- HEADER -->
<header>
  <div class="logo">BINJO BAGS</div>

  <div class="search-bar">
    <input type="text" placeholder="Search bags...">
  </div>

  <div class="account">
    ACCOUNT
    <div class="dropdown">
      <a href="#">Login</a>
      <a href="#">Register</a>
      <a href="#">My Orders</a>
    </div>
  </div>
</header>

<!-- NAV -->
<nav>
  <a href="#">Home</a>
  <a href="#">Women Bags</a>
  <a href="#">Men Bags</a>
  <a href="#">Travel Bags</a>
  <a href="#">Cart 🛒</a>
</nav>

<!-- PRODUCTS -->
<div class="container">
  <h2>Featured Bags</h2>

  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
      <h4>Luxury Bag</h4>
      <p>KSh 1500</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975958225-5bcd6c3d0d4a">
      <h4>Travel Bag</h4>
      <p>KSh 1800</p>
      <button>Add to Cart</button>
    </div>
  </div>
</div>

</body>
</html>
