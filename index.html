<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BINJO Bags Store</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f5f5;
}/* SPLASH ENTRY */ #splash{ position:fixed; top:0;left:0; width:100%;height:100%; background:linear-gradient(135deg,#111,#333,#000); color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; animation:fadeOut 3s ease forwards; animation-delay:3s; }

#splash h1{ font-size:50px; letter-spacing:3px; }

#splash p{ font-style:italic; margin-top:10px; }

@keyframes fadeOut{ to{opacity:0;visibility:hidden;} }

/* HEADER */ header{ background:#111; color:white; padding:15px; text-align:center; font-size:20px; font-weight:bold; }

/* CATEGORY BAR */ .categories{ display:flex; overflow-x:auto; gap:10px; padding:10px; background:white; } .category{ padding:8px 12px; border-radius:20px; background:#eee; cursor:pointer; white-space:nowrap; } .category.active{ background:#111; color:white; }

/* PRODUCTS */ .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; padding:10px; } .card{ background:white; padding:10px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); } .card img{ width:100%; border-radius:10px; } .card button{ margin-top:5px; width:100%; padding:8px; border:none; background:#111; color:white; border-radius:5px; cursor:pointer; }

/* BOTTOM NAV */ .nav{ position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; padding:10px 0; color:white; } .nav div{ text-align:center; font-size:12px; cursor:pointer; }

/* CART */ #cartPanel{ position:fixed; right:0; top:0; width:300px; height:100%; background:white; box-shadow:-2px 0 10px rgba(0,0,0,0.2); padding:10px; overflow:auto; display:none; }

#cartPanel h3{ margin-top:0; }

.whatsapp{ background:green; color:white; padding:10px; display:block; text-align:center; border-radius:5px; text-decoration:none; margin-top:10px; } </style>

</head>
<body><!-- SPLASH --><div id="splash">
<h1>BINJO 💯</h1>
<p>Where quality meets affordable prices</p>
</div><header>BINJO BAG STORE</header><!-- CATEGORY --><div class="categories">
<div class="category active" onclick="filterCat('all')">All</div>
<div class="category" onclick="filterCat('men')">Men Bags</div>
<div class="category" onclick="filterCat('women')">Women Bags</div>
<div class="category" onclick="filterCat('travel')">Travel</div>
<div class="category" onclick="filterCat('tote')">Tote</div>
</div><!-- PRODUCTS --><div class="grid" id="grid">
</div><!-- CART --><div id="cartPanel">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<a class="whatsapp" id="waBtn" target="_blank">Order on WhatsApp</a>
</div><!-- NAV --><div class="nav">
<div onclick="showHome()">🏠 Home</div>
<div onclick="toggleCart()">🛒 Cat</div>
<div onclick="showCats()">📂 Category</div>
<div onclick="alert('Account coming soon')">👤 Account</div>
</div><script>
const products=[
{name:'Men Leather Bag',cat:'men',img:'https://via.placeholder.com/200',price:1200},
{name:'Women Handbag',cat:'women',img:'https://via.placeholder.com/200',price:1500},
{name:'Travel Backpack',cat:'travel',img:'https://via.placeholder.com/200',price:2000},
{name:'Tote Bag',cat:'tote',img:'https://via.placeholder.com/200',price:1100}
];

let cart=[];

function render(list){
const g=document.getElementById('grid');
g.innerHTML='';
list.forEach((p,i)=>{
g.innerHTML+=`
<div class='card'>
<img src='${p.img}' />
<h4>${p.name}</h4>
<p>KSh ${p.price}</p>
<button onclick="addCart(${i})">Add to Cat</button>
</div>`;
});
}

function addCart(i){
cart.push(products[i]);
updateCart();
}

function updateCart(){
const c=document.getElementById('cartItems');
c.innerHTML='';
let msg='';
cart.forEach(p=>{
c.innerHTML+=`<p>${p.name} - KSh ${p.price}</p>`;
msg+=`${p.name} KSh ${p.price}%0A`;
});

document.getElementById('waBtn').href=
`https://wa.me/254792887738?text=Hello%20I%20want%20to%20order:%0A${msg}`;
}

function filterCat(cat){
document.querySelectorAll('.category').forEach(c=>c.classList.remove('active'));
event.target.classList.add('active');
if(cat==='all')render(products);
else render(products.filter(p=>p.cat===cat));
}

function toggleCart(){
document.getElementById('cartPanel').style.display=
 document.getElementById('cartPanel').style.display==='block'?'none':'block';
}

function showHome(){render(products)}
function showCats(){alert('Use category buttons above')}

render(products);
</script></body>
</html>
