<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINJO Bags</title><style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* ENTRY SCREEN */
.entry {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: linear-gradient(black, #111);
  color: gold;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  animation: slideOut 3s forwards;
}

.entry h1 {
  font-size: 3rem;
  transform: skew(-10deg);
}

.entry p {
  color: white;
}

/* ANIMATION */
@keyframes slideOut {
  0% {transform: translateX(0);}
  100% {transform: translateX(-100%);}
}

/* SHOP */
.shop {
  padding: 20px;
  margin-top: 20px;
}

.product {
  background: white;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.product img {
  width: 100%;
  border-radius: 10px;
}
</style></head><body><!-- ENTRY --><div class="entry">
  <h1>BINJO 💯</h1>
  <p>Where quality meets affordability</p>
</div><!-- SHOP --><div class="shop">  <div class="product">
    <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3" />
    <h3>Luxury Designer Bag</h3>
    <p>KSh 2,500</p>
  </div>  <div class="product">
    <img src="https://images.unsplash.com/photo-1591561954557-26941169b49e" />
    <h3>Classic Handbag</h3>
    <p>KSh 1,800</p>
  </div></div></body>
</html>
