<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINJO Bags 💯</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 INTRO -->
<div id="intro">
  <div class="logo">
    <div class="elephant-logo">
      <span class="ear">N</span>
      <span class="trunk">I</span>
      <span class="ear">J</span>
    </div>
    <h1>BINJO 💯</h1>
    <p>Where quality meets affordability</p>
  </div>
</div>

<!-- 🔝 HEADER -->
<header>
  <h2>BINJO 💯</h2>
  <button onclick="toggleCart()">🛒 Cart</button>
</header>

<!-- 🖼️ SLIDER -->
<div class="slider">
  <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
</div>

<!-- 📂 CATEGORIES -->
<div class="categories">
  <button onclick="filterProducts('all')">All</button>
  <button onclick="filterProducts('women')">Women</button>
  <button onclick="filterProducts('travel')">Travel</button>
  <button onclick="filterProducts('office')">Office</button>
</div>

<!-- 🛍️ PRODUCTS -->
<div id="products" class="products"></div>

<!-- 🛒 CART -->
<div id="cart" class="cart hidden">
  <h3>Your Cart</h3>
  <div id="cart-items"></div>

  <button onclick="orderViaWhatsApp()" class="whatsapp-order">
    Order via WhatsApp
  </button>

  <button onclick="clearCart()" class="clear-cart">
    Clear Cart
  </button>
</div>

<script src="script.js"></script>
</body>
</html>
