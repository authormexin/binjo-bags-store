<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINJO Bags</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: white;
  padding: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 10px;
}

header input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

/* TITLE */
h2 {
  padding: 10px;
  margin: 0;
}

/* GRID */
.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

/* CARD */
.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  position: relative;
}

/* DISCOUNT */
.discount {
  position: absolute;
  top: 10px;
  right: 10px;
  background: orange;
  color: white;
  padding: 3px 6px;
  font-size: 12px;
  border-radius: 5px;
}

/* IMAGE */
.card img {
  width: 100%;
  border-radius: 10px;
}

/* NAME */
.name {
  font-size: 14px;
  margin: 5px 0;
}

/* PRICE */
.price {
  font-weight: bold;
  font-size: 16px;
}

/* OLD PRICE */
.old-price {
  text-decoration: line-through;
  color: gray;
  font-size: 12px;
}

/* BRAND */
.brand {
  color: orange;
  font-weight: bold;
  font-size: 12px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 10px;
  background: orange;
  color: white;
  border: none;
  border-radius: 5px;
  margin-top: 5px;
}
</style>

</head>

<body>

<header>
  <input type="text" placeholder="Search on BINJO">
</header>

<h2>Women Bags</h2>

<div class="products" id="products"></div>

<script>

// PRODUCTS (Jumia style but edited)
const items = [
  {
    name: "Simple Tote Bag",
    price: 736 + 300,
    old: 5999,
    discount: "-88%",
    image: "https://images.unsplash.com/photo-1584917865442-de89df76afd3"
  },
  {
    name: "3 in 1 Ladies Handbag Set",
    price: 1200 + 300,
    old: 2000,
    discount: "-40%",
    image: "https://images.unsplash.com/photo-1591561954557-26941169b49e"
  },
  {
    name: "French Style Shoulder Bag",
    price: 540 + 300,
    old: 800,
    discount: "-33%",
    image: "https://images.unsplash.com/photo-1598532163257-ae3c6b2524b6"
  },
  {
    name: "Large Capacity Tote Bag",
    price: 949 + 300,
    old: 1900,
    discount: "-52%",
    image: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa"
  },
  {
    name: "PU Leather Tote Bag",
    price: 699 + 300,
    old: 1200,
    discount: "-40%",
    image: "https://images.unsplash.com/photo-1520975922203-bc0e1e01d37c"
  },
  {
    name: "Classic Women Handbag",
    price: 699 + 300,
    old: 1500,
    discount: "-30%",
    image: "https://images.unsplash.com/photo-1600180758890-6b94519a8ba6"
  }
];

// DISPLAY
const container = document.getElementById("products");

items.forEach(item => {
  container.innerHTML += `
    <div class="card">
      <div class="discount">${item.discount}</div>
      <img src="${item.image}">
      <div class="name">${item.name}</div>
      <div class="price">KSh ${item.price}</div>
      <div class="old-price">KSh ${item.old}</div>
      <div class="brand">BINJO EXPRESS</div>
      <button onclick="addToCart()">Add To Cart</button>
    </div>
  `;
});

// POPUP
function addToCart() {
  alert("✅ Added to cart");
}

</script>

</body>
</html>
