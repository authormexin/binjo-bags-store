<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINJO Bags</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* OPENING SCREEN */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  z-index: 999;
  animation: fadeOut 3s forwards;
  animation-delay: 2s;
}

@keyframes fadeOut {
  to {opacity:0; visibility:hidden;}
}

/* HEADER */
header {
  background: white;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.menu {
  font-size: 25px;
  cursor: pointer;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  left: -250px;
  top: 0;
  width: 250px;
  height: 100%;
  background: white;
  padding: 20px;
  transition: 0.3s;
}

#sidebar a {
  display: block;
  margin: 15px 0;
  text-decoration: none;
  color: black;
}

/* CATEGORY BAR */
.categories {
  display: flex;
  overflow-x: auto;
  background: white;
  padding: 10px;
  gap: 10px;
}

.cat {
  background: orange;
  color: white;
  padding: 8px 15px;
  border-radius: 20px;
  white-space: nowrap;
  cursor: pointer;
}

/* GRID */
.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

/* CARD */
.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.price {
  font-weight: bold;
}

.old {
  text-decoration: line-through;
  color: gray;
  font-size: 12px;
}

.brand {
  color: orange;
  font-size: 12px;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 8px;
  border: none;
  margin-top: 5px;
  border-radius: 5px;
}

.cart-btn {
  background: orange;
  color: white;
}

.whatsapp-btn {
  background: green;
  color: white;
}

/* CART */
#cart {
  position: fixed;
  bottom: 0;
  background: white;
  width: 100%;
  max-height: 200px;
  overflow: auto;
  border-top: 2px solid #ccc;
  display: none;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}
</style>

</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div>BINJO 💯</div>
  <small>Where quality meets affordable prices</small>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <a href="#">Home</a>
  <a href="#">Women Bags</a>
  <a href="#">Men Bags</a>
  <a href="#">Travel Bags</a>
  <a href="https://wa.me/254792887738">Help (WhatsApp)</a>
</div>

<!-- HEADER -->
<header>
  <div class="menu" onclick="toggleMenu()">☰</div>
  <input placeholder="Search BINJO">
</header>

<!-- CATEGORIES -->
<div class="categories">
  <div class="cat">Women</div>
  <div class="cat">Men</div>
  <div class="cat">Travel</div>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div id="cart"></div>

<script>
let cart = [];

function toggleMenu() {
  let sidebar = document.getElementById("sidebar");
  sidebar.style.left = sidebar.style.left === "0px" ? "-250px" : "0px";
}

// PRODUCTS (REALISTIC JUMIA STYLE IMAGES)
const items = [
  {
    name: "Grey Tote Bag",
    price: 736 + 300,
    old: 5999,
    img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3"
  },
  {
    name: "3 in 1 Black Handbag",
    price: 1200 + 300,
    old: 2000,
    img: "https://images.unsplash.com/photo-1591561954557-26941169b49e"
  },
  {
    name: "Beige Shoulder Bag",
    price: 540 + 300,
    old: 800,
    img: "https://images.unsplash.com/photo-1598532163257-ae3c6b2524b6"
  },
  {
    name: "Black Large Tote",
    price: 949 + 300,
    old: 1900,
    img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa"
  }
];

// DISPLAY PRODUCTS
const container = document.getElementById("products");

items.forEach((item, index) => {
  container.innerHTML += `
    <div class="card">
      <img src="${item.img}">
      <div>${item.name}</div>
      <div class="price">KSh ${item.price}</div>
      <div class="old">KSh ${item.old}</div>
      <div class="brand">BINJO EXPRESS</div>

      <button class="cart-btn" onclick="addToCart('${item.name}')">Add to Cart</button>
      <button class="whatsapp-btn" onclick="orderWhatsApp('${item.name}', ${item.price})">Order via WhatsApp</button>
    </div>
  `;
});

// ADD TO CART
function addToCart(name) {
  cart.push(name);
  alert("👍 Added to cart");
  showCart();
}

// SHOW CART
function showCart() {
  let cartBox = document.getElementById("cart");
  cartBox.style.display = "block";

  cartBox.innerHTML = "<h3>Cart</h3>";

  cart.forEach((item, index) => {
    cartBox.innerHTML += `
      <div class="cart-item">
        ${item}
        <button onclick="removeItem(${index})">❌</button>
      </div>
    `;
  });
}

// REMOVE
function removeItem(i) {
  cart.splice(i,1);
  showCart();
}

// WHATSAPP
function orderWhatsApp(name, price) {
  let msg = `Hello BINJO, I want to order: ${name} at KSh ${price}`;
  window.open(`https://wa.me/254792887738?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
