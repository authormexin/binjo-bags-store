<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BINJO Store</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* SPLASH SCREEN */
#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: opacity 1s ease;
  z-index: 1000;
}

#intro h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

#intro p {
  font-size: 16px;
  opacity: 0.8;
}

#intro img {
  width: 150px;
  margin: 20px 0;
  border-radius: 10px;
}

/* MAIN STORE */
#main {
  display: none;
  padding: 20px;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

.product-card {
  border: 1px solid #eee;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.product-card img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- INTRO SCREEN -->
<div id="intro">
  <h1>BINJO💯</h1>
  <img src="https://via.placeholder.com/150" alt="Bag">
  <p>Where quality meets affordable prices</p>
</div>

<!-- MAIN STORE -->
<div id="main">
  <h2>Our Bags</h2>

  <div class="product-grid">
    <div class="product-card">
      <img src="https://via.placeholder.com/200" alt="">
      <p>Stylish Bag</p>
      <p>KSh 1,500</p>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/200" alt="">
      <p>Classic Bag</p>
      <p>KSh 1,800</p>
    </div>
  </div>
</div>

<script>
setTimeout(() => {
  document.getElementById("intro").style.opacity = "0";

  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("main").style.display = "block";
  }, 1000);

}, 3000);
</script>

</body>
</html>
