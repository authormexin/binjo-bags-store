<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binjo Bags Store</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.header {
  padding: 10px;
  background: white;
  position: sticky;
  top: 0;
}

.search {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ddd;
}

.title {
  padding: 10px;
  font-weight: bold;
  font-size: 18px;
}

.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 10px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card h3 {
  font-size: 14px;
  margin: 6px 0;
}

.price {
  font-weight: bold;
  font-size: 18px;
}

.stars {
  color: orange;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="header">
  <input class="search" placeholder="Women Sneakers">
</div>

<div class="title">Women Bags</div>

<div class="products">

  <div class="card">
    <img src="https://i.imgur.com/7QFQG6G.png">
    <h3>PU Leather Tote Bag</h3>
    <div class="price">KSh 999</div>
    <div class="stars">★★★★★ (50)</div>
  </div>

  <div class="card">
    <img src="https://i.imgur.com/XhKQ9Qx.png">
    <h3>Classic Women Handbag</h3>
    <div class="price">KSh 999</div>
    <div class="stars">★★★★★ (0)</div>
  </div>

  <div class="card">
    <img src="https://i.imgur.com/3tFZ4lG.png">
    <h3>Fashion Tote Bag</h3>
    <div class="price">KSh 1099</div>
    <div class="stars">★★★★☆ (46)</div>
  </div>

  <div class="card">
    <img src="https://i.imgur.com/yQhXG9T.png">
    <h3>Women Wallet Purse</h3>
    <div class="price">KSh 739</div>
    <div class="stars">★★★★★ (735)</div>
  </div>

</div>

</body>
</html>
